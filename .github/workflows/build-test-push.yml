# Required repository secrets:
#   DOCKERHUB_USERNAME - Docker Hub account username, used for `docker login` and pushes.
#   DOCKERHUB_TOKEN    - Docker Hub access token (NOT an account password; a 2FA-protected
#                        password cannot be used) with "Read, Write, Delete" scope. Pushing
#                        images only needs Read & Write, but peter-evans/dockerhub-description
#                        requires the Delete scope as well -- a Read & Write token returns
#                        403 Forbidden when updating the description. Create one at
#                        https://hub.docker.com/settings/security.

name: build-test-push

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  # Cancel superseded runs on a branch/PR when a new commit is pushed, but let master
  # runs finish so an in-flight publish isn't interrupted (half-built manifest list or
  # an unpublished directory).
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

env:
  REPO_NAME: emmercm/qbittorrent

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          - "3.3"
          - "4.0"
          - "4.1"
          - "4.2"
          - "4.3"
          - "4.4"
          - "4.5"
          - "4.6"
          - "5.0"
          - "5.1"
          - "5.2"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Run hadolint
        # Pinned to a full version: hadolint-action does not publish a moving major tag
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.directory }}/Dockerfile

  # Decide which directories to build: those whose files changed, plus any whose
  # image tag is not yet published (e.g. a version bump, which changes this file
  # rather than the directory). Unchanged, already-published directories are skipped.
  setup:
    runs-on: ubuntu-latest
    outputs:
      # build job's matrix: flat include list, one entry per (directory, arch)
      build_matrix: ${{ steps.select.outputs.build_matrix }}
      # merge job's matrix: selected directories only (one manifest list per directory)
      merge_matrix: ${{ steps.select.outputs.merge_matrix }}
      # whether any directory was selected to build at all
      has_builds: ${{ steps.select.outputs.has_builds }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Needed for `docker buildx imagetools inspect` to read the libtorrent base and
      # published-tag manifests when detecting architectures.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Detect changed directories
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            "3.3": "3.3/**"
            "4.0": "4.0/**"
            "4.1": "4.1/**"
            "4.2": "4.2/**"
            "4.3": "4.3/**"
            "4.4": "4.4/**"
            "4.5": "4.5/**"
            "4.6": "4.6/**"
            "5.0": "5.0/**"
            "5.1": "5.1/**"
            "5.2": "5.2/**"

      - name: Select directories to build
        id: select
        env:
          CHANGED: ${{ steps.filter.outputs.changes }}
          # Every image directory with its qBittorrent version and extra tags.
          # The implicit ${VERSION} and ${VERSION}-alpine tags are always added too.
          # https://github.com/qbittorrent/qBittorrent/releases
          CANDIDATES: |
            [
              {"directory": "3.3", "version": "3.3.16", "tags": "3.3 3.3-alpine 3 3-alpine"},
              {"directory": "4.0", "version": "4.0.4", "tags": "4.0 4.0-alpine"},
              {"directory": "4.1", "version": "4.1.9", "tags": "4.1 4.1-alpine"},
              {"directory": "4.2", "version": "4.2.5", "tags": "4.2 4.2-alpine"},
              {"directory": "4.3", "version": "4.3.9", "tags": "4.3 4.3-alpine"},
              {"directory": "4.4", "version": "4.4.5", "tags": "4.4 4.4-alpine"},
              {"directory": "4.5", "version": "4.5.5", "tags": "4.5 4.5-alpine"},
              {"directory": "4.6", "version": "4.6.7", "tags": "4.6 4.6-alpine 4 4-alpine"},
              {"directory": "5.0", "version": "5.0.5", "tags": "5.0 5.0-alpine"},
              {"directory": "5.1", "version": "5.1.4", "tags": "5.1 5.1-alpine"},
              {"directory": "5.2", "version": "5.2.3", "tags": "5.2 5.2-alpine 5 5-alpine latest"}
            ]
        run: |
          # Each platform builds on the closest runner architecture to minimize QEMU
          # emulation: amd64 (and 386, which x86-64 runs in hardware) on amd64, and the
          # arm variants on ARM hosts (arm64v8 natively; armv7/armv6 via aarch32 emulation).
          # The remaining arches (ppc64le, s390x, riscv64) have no native runner and are
          # fully emulated.
          runner_for() {
            case "$1" in
              linux/arm*) echo "ubuntu-24.04-arm" ;;
              *) echo "ubuntu-latest" ;;
            esac
          }

          # Slug: strip leading "linux/", drop remaining slashes (linux/arm/v7 -> armv7).
          slug_for() {
            local p="${1#linux/}"
            echo "${p//\//}"
          }

          # Print one "os/arch[/variant]" line per real platform in an image's manifest,
          # dropping attestation entries (platform.os == "unknown"). Non-zero if the
          # image ref cannot be inspected (e.g. the tag does not exist).
          platforms_of() {
            docker buildx imagetools inspect --raw "$1" 2>/dev/null \
              | jq -r '.manifests[]?
                  | select(.platform.os != null and .platform.os != "unknown")
                  | .platform
                  | .os + "/" + .architecture
                    + (if (.variant // "") == "" then "" else "/" + .variant end)'
          }

          # Apply containerd's default-variant rule so a base image's "arm64/v8" compares
          # equal to a buildx-pushed image's normalized "arm64". Without this, arm64 would
          # always look missing and every directory would rebuild forever.
          canonical() {
            sed -E 's#^linux/arm64/v8$#linux/arm64#'
          }

          BUILD='[]'
          MERGE='[]'
          while read -r ENTRY; do
            DIRECTORY=$(jq -r '.directory' <<< "${ENTRY}")
            VERSION=$(jq -r '.version' <<< "${ENTRY}")

            # Expected arches come from the directory's pinned libtorrent base image.
            # tail -1 selects the final stage's FROM, not the build stage's.
            BASE_REF=$(grep -iE '^FROM emmercm/libtorrent:' "${DIRECTORY}/Dockerfile" | tail -1 | awk '{print $2}')
            EXPECTED=$(platforms_of "${BASE_REF}" | sort -u)
            if [[ -z "${EXPECTED}" ]]; then
              echo "::error::Could not determine architectures for ${DIRECTORY} from ${BASE_REF}"
              exit 1
            fi

            if jq -e --arg d "${DIRECTORY}" 'index($d) != null' <<< "${CHANGED}" > /dev/null; then
              echo "${DIRECTORY}: files changed, building"
            else
              PUBLISHED=$(platforms_of "${REPO_NAME}:${VERSION}" | canonical | sort -u || true)
              if [[ -z "${PUBLISHED}" ]]; then
                echo "${DIRECTORY}: ${REPO_NAME}:${VERSION} not yet published, building"
              else
                MISSING=$(comm -23 <(printf '%s\n' "${EXPECTED}" | canonical) <(printf '%s\n' "${PUBLISHED}"))
                if [[ -n "${MISSING}" ]]; then
                  echo "${DIRECTORY}: ${REPO_NAME}:${VERSION} building; architectures missing:"
                  printf '%s\n' "${MISSING}" | sed 's/^/  /'
                else
                  echo "${DIRECTORY}: unchanged and all arches published, skipping"
                  continue
                fi
              fi
            fi

            # Selected: record the directory for merge, and one build entry per arch.
            MERGE=$(jq -c ". + [${ENTRY}]" <<< "${MERGE}")
            while read -r PLATFORM; do
              [[ -z "${PLATFORM}" ]] && continue
              BUILD=$(jq -c \
                --arg directory "${DIRECTORY}" \
                --arg version "${VERSION}" \
                --arg platform "${PLATFORM}" \
                --arg runner "$(runner_for "${PLATFORM}")" \
                --arg slug "$(slug_for "${PLATFORM}")" \
                '. + [{directory: $directory, version: $version, platform: $platform, runner: $runner, slug: $slug}]' \
                <<< "${BUILD}")
            done <<< "${EXPECTED}"
          done < <(jq -c '.[]' <<< "${CANDIDATES}")

          echo "Selected build matrix: ${BUILD}"
          echo "build_matrix={\"include\":${BUILD}}" >> "${GITHUB_OUTPUT}"
          echo "merge_matrix={\"include\":${MERGE}}" >> "${GITHUB_OUTPUT}"
          if [[ "${BUILD}" == "[]" ]]; then
            echo "has_builds=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_builds=true" >> "${GITHUB_OUTPUT}"
          fi

  # One job per (directory, platform). Each builds and tests a single-platform image,
  # then (on master) pushes it to the registry by digest only -- no tags. The tags are
  # applied later by the merge job, so nothing usable is published until everything passes.
  build:
    needs:
      - lint
      - setup
    if: needs.setup.outputs.has_builds == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.build_matrix) }}
    env:
      DIRECTORY: ${{ matrix.directory }}
      VERSION: ${{ matrix.version }}
      PLATFORM: ${{ matrix.platform }}
      # Cache scope keeps each directory+platform's layers separate
      CACHE_SCOPE: ${{ matrix.directory }}-${{ matrix.slug }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Needed to run the armv7/armv6 (aarch32) images on the arm64 host during testing
      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # Must come before the test build below, which pulls the pinned libtorrent base --
      # otherwise that pull is anonymous and counts against Docker Hub's pull limit, from
      # every job in the matrix. Not gated on master: PR runs pull the base too, and it is
      # the pull that needs authenticating, not the push. Fork PRs get no secrets and fall
      # back to anonymous.
      - name: Log in to Docker Hub
        if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image for testing
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ env.DIRECTORY }}
          platforms: ${{ env.PLATFORM }}
          build-args: |
            VERSION=${{ env.VERSION }}
          tags: ${{ env.REPO_NAME }}:${{ env.VERSION }}
          load: true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}

      - name: Test image
        run: |
          # container-structure-test runs on the host, so fetch the runner's architecture
          case "${RUNNER_ARCH}" in
            X64)   CST_ARCH=amd64 ;;
            ARM64) CST_ARCH=arm64 ;;
            *)     echo "Unsupported runner architecture: ${RUNNER_ARCH}" >&2; exit 1 ;;
          esac
          curl -LO "https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-${CST_ARCH}"
          chmod +x "container-structure-test-linux-${CST_ARCH}"
          sudo mv "container-structure-test-linux-${CST_ARCH}" /usr/local/bin/container-structure-test
          container-structure-test test --config "${DIRECTORY}/container-structure-test.yml" --image "${REPO_NAME}:${VERSION}"

      - name: Push image by digest
        id: push
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ env.DIRECTORY }}
          platforms: ${{ env.PLATFORM }}
          build-args: |
            VERSION=${{ env.VERSION }}
          outputs: type=image,name=${{ env.REPO_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}

      - name: Export digest
        if: github.ref == 'refs/heads/master'
        run: |
          mkdir -p digests
          echo "${{ steps.push.outputs.digest }}" > "digests/${{ matrix.slug }}"

      - name: Upload digest
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: digests-${{ matrix.directory }}-${{ matrix.slug }}
          path: digests/*
          if-no-files-found: error

  # One job per directory: combine its per-platform digests into a single multi-arch
  # manifest list and apply all of the directory's tags. Runs only after every build
  # job succeeded, so a failure anywhere prevents any tags from being published.
  merge:
    needs:
      - setup
      - build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.merge_matrix) }}
    env:
      VERSION: ${{ matrix.version }}
      TAGS: ${{ matrix.tags }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: digests-${{ matrix.directory }}-*
          path: digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push manifest list
        run: |
          TAG_ARGS=()
          for TAG in "${VERSION}" "${VERSION}-alpine" ${TAGS}; do
            TAG_ARGS+=(--tag "${REPO_NAME}:${TAG}")
          done
          SOURCES=()
          for FILE in digests/*; do
            SOURCES+=("${REPO_NAME}@$(cat "${FILE}")")
          done
          docker buildx imagetools create "${TAG_ARGS[@]}" "${SOURCES[@]}"

      - name: Inspect manifest list
        run: docker buildx imagetools inspect "${REPO_NAME}:${VERSION}"

  # Independent of the image build: the Docker Hub description tracks README.md, so
  # it is updated on every master push even when no directory needed rebuilding.
  update-description:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Read short description from README
        id: readme
        run: echo "short=$(grep '^\w' README.md | head -1)" >> "${GITHUB_OUTPUT}"

      - name: Update Docker Hub description
        # Can't use 2FA: https://github.com/docker/roadmap/issues/115
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.REPO_NAME }}
          short-description: ${{ steps.readme.outputs.short }}

  # !!! This check should be required by GitHub !!!
  build-status-check:
    if: always()
    needs:
      - lint
      - setup
      - build
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # release/v1
        with:
          allowed-skips: build
          jobs: ${{ toJSON(needs) }}
